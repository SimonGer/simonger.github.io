<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fail2Drive Scenario Gallery</title>
  <meta name="description" content="Image-first gallery for the 100 generalization scenarios in the Fail2Drive benchmark.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@8..144,400;8..144,500;8..144,600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f3f8;
      --bg-2: #e8ecf2;
      --bg-soft: #f7f9fc;
      --surface: rgba(255, 255, 255, 0.84);
      --surface-strong: rgba(255, 255, 255, 0.96);
      --ink: #0c1222;
      --muted: #5a6478;
      --muted-light: #7a8a9e;
      --line: rgba(12, 18, 34, 0.08);
      --line-strong: rgba(36, 78, 99, 0.22);
      --accent: #4a5f7f;
      --accent-strong: #2d3d4f;
      --accent-warm: #5a7aa8;
      --accent-soft: rgba(74, 95, 127, 0.1);
      --shadow: 0 22px 56px rgba(12, 18, 34, 0.11);
      --shadow-soft: 0 14px 34px rgba(12, 18, 34, 0.08);
      --shadow-xs: 0 4px 12px rgba(12, 18, 34, 0.04);
      --radius: 30px;
      --radius-card: 24px;
      --page-max: 1360px;
      --page-side-gap: 56px;
      --topbar-height: 78px;
      --gallery-columns: 5;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Newsreader", serif;
      font-size: 17px;
      line-height: 1.7;
      background:
        radial-gradient(circle at 14% 10%, rgba(90, 122, 168, 0.08), transparent 28%),
        radial-gradient(circle at 82% 8%, rgba(74, 95, 127, 0.08), transparent 32%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 56%, var(--bg-2) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    figure {
      margin: 0;
    }

    .page {
      width: min(var(--page-max), calc(100vw - var(--page-side-gap)));
      margin: 0 auto;
      padding: 28px 0 80px;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      min-height: var(--topbar-height);
      margin-bottom: 36px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(247, 249, 252, 0.82);
      backdrop-filter: blur(20px) saturate(1.05);
      box-shadow: var(--shadow-soft);
      transition: box-shadow 0.2s ease;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 50px;
      padding: 0 8px 0 4px;
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 1;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .back-link-icon {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(74, 95, 127, 0.12);
      background: rgba(255, 255, 255, 0.85);
      color: var(--accent-strong);
      box-shadow: var(--shadow-xs);
      transition: transform 0.2s ease, border-color 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .back-link-icon svg {
      width: 15px;
      height: 15px;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--accent-strong);
      transform: translateX(-3px);
    }

    .back-link:hover .back-link-icon,
    .back-link:focus-visible .back-link-icon {
      transform: translateX(-3px);
      border-color: rgba(74, 95, 127, 0.2);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 20px rgba(12, 18, 34, 0.08);
    }

    .topbar-nav {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      min-width: 0;
    }

    .topbar-link {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(74, 95, 127, 0.08);
      border-radius: 999px;
      color: var(--muted-light);
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.44);
      transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .topbar-link:hover,
    .topbar-link:focus-visible {
      border-color: rgba(74, 95, 127, 0.14);
      background: rgba(255, 255, 255, 0.68);
      color: var(--accent-strong);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(12, 18, 34, 0.06);
    }

    .topbar-link.is-active {
      border-color: rgba(74, 95, 127, 0.18);
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 10px 24px rgba(12, 18, 34, 0.08);
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.02;
      letter-spacing: -0.03em;
    }

    .gallery-root {
      display: grid;
      gap: 32px;
    }

    .section {
      --section-accent: rgba(74, 95, 127, 0.12);
      --section-accent-strong: #2d3d4f;
      --section-accent-text: #2d3d4f;
      --section-glow: rgba(74, 95, 127, 0.08);
      display: grid;
      gap: 20px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at top right, var(--section-glow), transparent 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(247, 249, 252, 0.96)),
        var(--surface);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.84),
        0 18px 38px rgba(12, 18, 34, 0.07);
      backdrop-filter: blur(18px);
      scroll-margin-top: calc(var(--topbar-height) + 32px);
      transition: box-shadow 0.2s ease;
    }

    .section::before {
      content: "";
      width: 80px;
      height: 3px;
      border-radius: 999px;
      background: var(--section-accent-strong);
      opacity: 0.75;
    }

    .section-head {
      display: flex;
      align-items: end;
      gap: 14px;
      padding-bottom: 0;
    }

    h2 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.38rem, 2vw, 1.78rem);
      font-weight: 700;
      color: var(--section-accent-strong);
      letter-spacing: -0.015em;
    }

    .scenario-stack {
      display: grid;
      gap: 14px;
    }

    h3 {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.06rem, 1.4vw, 1.19rem);
      font-weight: 700;
      color: var(--section-accent-strong);
      letter-spacing: -0.01em;
    }

    .scenario-block {
      display: grid;
      gap: 14px;
      padding: 18px;
      border: 1px solid rgba(12, 18, 34, 0.06);
      border-radius: calc(var(--radius) - 6px);
      background: var(--surface-strong);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        inset 0 0 0 1px rgba(255, 255, 255, 0.26);
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .scenario-block:hover {
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.88),
        inset 0 0 0 1px rgba(255, 255, 255, 0.32);
    }

    .scenario-head {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 0;
      padding-bottom: 0;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(var(--gallery-columns), minmax(0, 1fr));
      gap: 16px;
    }

    .gallery-card {
      min-width: 0;
    }

    .gallery-trigger {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      border-radius: var(--radius-card);
      background: transparent;
      appearance: none;
      cursor: pointer;
      text-align: inherit;
      outline: none;
    }

    .gallery-figure {
      position: relative;
      overflow: hidden;
      aspect-ratio: 5 / 3;
      border-radius: var(--radius-card);
      border: 1px solid color-mix(in srgb, var(--section-accent) 64%, rgba(12, 18, 34, 0.04) 36%);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.16), transparent 32%),
        color-mix(in srgb, white 92%, var(--section-accent) 8%);
      box-shadow: 0 10px 24px rgba(12, 18, 34, 0.05);
      transition: transform 0.24s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.24s ease, border-color 0.24s ease;
    }

    .gallery-card:hover .gallery-figure,
    .gallery-card:focus-within .gallery-figure {
      transform: translateY(-4px);
      border-color: color-mix(in srgb, var(--section-accent-strong) 44%, rgba(12, 18, 34, 0.06) 56%);
      box-shadow: 0 18px 36px rgba(12, 18, 34, 0.11);
    }

    .gallery-trigger:focus-visible .gallery-figure {
      box-shadow:
        0 0 0 3px color-mix(in srgb, var(--section-accent) 44%, rgba(12, 18, 34, 0.02) 56%),
        0 18px 36px rgba(12, 18, 34, 0.11);
    }

    .gallery-figure::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(180deg, transparent 60%, rgba(12, 18, 34, 0.08) 100%);
      pointer-events: none;
    }

    .gallery-figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.55);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .gallery-card:hover .gallery-figure img,
    .gallery-card:focus-within .gallery-figure img {
      transform: scale(1.65);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 32px;
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, backdrop-filter 0.28s ease, -webkit-backdrop-filter 0.28s ease;
    }

    .lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox.is-closing {
      opacity: 0;
      pointer-events: none;
    }

    .lightbox-dialog {
      position: relative;
      width: min(1200px, 100%);
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 26px 64px rgba(12, 18, 34, 0.17);
      transform: translateY(20px) scale(0.96);
      opacity: 0;
      transition: transform 0.34s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
    }

    .lightbox.is-open .lightbox-dialog {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .lightbox.is-closing .lightbox-dialog {
      transform: translateY(12px) scale(0.982);
      opacity: 0;
    }

    .lightbox-figure {
      overflow: hidden;
      border-radius: 18px;
      background: transparent;
    }

    .lightbox-image {
      width: 100%;
      max-height: calc(100vh - 64px);
      aspect-ratio: auto;
      object-fit: contain;
      transform: scale(0.982);
      transition: transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .lightbox.is-open .lightbox-image {
      transform: scale(1);
    }

    .lightbox.is-closing .lightbox-image {
      transform: scale(0.988);
    }

    @media (max-width: 1120px) {
      :root {
        --page-side-gap: 30px;
        --gallery-columns: 4;
      }
    }

    @media (max-width: 920px) {
      .topbar {
        align-items: flex-start;
        border-radius: 28px;
      }

      .topbar-nav {
        justify-content: flex-start;
      }

    }

    @media (max-width: 860px) {
      .page {
        width: min(100vw - 24px, 1400px);
      }

      .topbar {
        gap: 12px;
        margin-bottom: 14px;
      }

      .topbar,
      .section-head,
      .scenario-head {
        flex-direction: column;
        align-items: start;
      }

      .section {
        padding: 20px;
      }

      .back-link {
        padding: 0;
      }
    }

    @media (max-width: 640px) {
      :root {
        --gallery-columns: 3;
      }

      .page {
        width: min(100vw - 18px, 1600px);
        padding-top: 8px;
        padding-bottom: 28px;
      }

      .gallery-root {
        gap: 18px;
      }

      .section,
      .scenario-block {
        border-radius: 24px;
      }

      .gallery-grid {
        gap: 12px;
      }

      .gallery-card:hover .gallery-figure,
      .gallery-card:focus-within .gallery-figure {
        transform: translateY(-2px);
      }

      .lightbox {
        padding: 14px;
      }

      .lightbox-dialog {
        padding: 10px;
        border-radius: 22px;
      }

      .lightbox-image {
        max-height: calc(100vh - 28px);
      }
    }

    @media (max-width: 420px) {
      :root {
        --gallery-columns: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .gallery-figure,
      .gallery-figure img,
      .lightbox,
      .lightbox-dialog,
      .lightbox-image {
        transition: none;
      }
    }
  </style>
</head>

      { id: 1078, scenario: "Animals", image: "assets/1078_00141.jpg" },
      { id: 1079, scenario: "Animals", image: "assets/1079_00486.jpg" },
      { id: 1080, scenario: "Animals", image: "assets/1080_00648.jpg" },
      { id: 1081, scenario: "Animals", image: "assets/1081_00234.jpg" },
      { id: 1082, scenario: "Animals", image: "assets/1082_00222.jpg" },
      { id: 1083, scenario: "Animals", image: "assets/1083_00309.jpg" },
      { id: 1084, scenario: "Animals", image: "assets/1084_00162.jpg" },
      { id: 1085, scenario: "PedestriansOnRoad", image: "assets/1085_00288.jpg" },
      { id: 1086, scenario: "PedestriansOnRoad", image: "assets/1086_00285.jpg" },
      { id: 1087, scenario: "PedestriansOnRoad", image: "assets/1087_00279.jpg" },
      { id: 1088, scenario: "PedestriansOnRoad", image: "assets/1088_00171.jpg" },
      { id: 1089, scenario: "PedestriansOnRoad", image: "assets/1089_00192.jpg" },
      { id: 1090, scenario: "RightConstruction", image: "assets/1090_00219.jpg" },
      { id: 1091, scenario: "RightConstruction", image: "assets/1091_00144.jpg" },
      { id: 1092, scenario: "RightConstruction", image: "assets/1092_00153.jpg" },
      { id: 1093, scenario: "RightConstruction", image: "assets/1093_00192.jpg" },
      { id: 1094, scenario: "RightConstruction", image: "assets/1094_00354.jpg" },
      { id: 1095, scenario: "Wall", image: "assets/1095_00270.jpg" },
      { id: 1096, scenario: "Wall", image: "assets/1096_00237.jpg" },
      { id: 1097, scenario: "Wall", image: "assets/1097_00285.jpg" },
      { id: 1098, scenario: "Wall", image: "assets/1098_00249.jpg" },
      { id: 1099, scenario: "Wall", image: "assets/1099_00330.jpg" }
    ];

    const galleryRoot = document.getElementById("galleryRoot");
    const topbarNav = document.getElementById("topbarNav");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const humanize = (value) => value.replace(/([a-z])([A-Z])/g, "$1 $2");
    const getAssetName = (src) => src.split("/").pop().replace(/\.jpg$/i, ".webp");
    const getThumbPath = (src) => `../assets/gallery/thumbs/${getAssetName(src)}`;
    const getFullPath = (src) => `../assets/gallery/full/${getAssetName(src)}`;
    const categoryTheme = {
      "Behavior": {
        accent: "rgba(74, 95, 127, 0.16)",
        strong: "#4a6b8f",
        text: "#2d3f5a",
        glow: "rgba(74, 95, 127, 0.1)"
      },
      "Visual Lateral": {
        accent: "rgba(90, 115, 145, 0.15)",
        strong: "#5a7ba0",
        text: "#3a4f66",
        glow: "rgba(90, 115, 145, 0.09)"
      },
      "Visual Longitudinal": {
        accent: "rgba(70, 95, 130, 0.16)",
        strong: "#445f88",
        text: "#2d3d52",
        glow: "rgba(70, 95, 130, 0.1)"
      },
      "Robustness": {
        accent: "rgba(60, 85, 120, 0.15)",
        strong: "#3d5577",
        text: "#243140",
        glow: "rgba(60, 85, 120, 0.09)"
      }
    };
    let closeTimer;
    const groupedByScenario = scenarios.reduce((acc, item) => {
      if (!acc[item.scenario]) {
        acc[item.scenario] = [];
      }
      acc[item.scenario].push(item);
      return acc;
    }, {});

    const navLinks = [];
    const openLightbox = (src, alt) => {
      window.clearTimeout(closeTimer);
      lightbox.classList.remove("is-closing");
      lightboxImage.src = getFullPath(src);
      lightboxImage.alt = alt;
      lightbox.classList.add("is-open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    };

    const closeLightbox = () => {
      if (!lightbox.classList.contains("is-open")) {
        return;
      }

      lightbox.classList.add("is-closing");
      lightbox.classList.remove("is-open");
      closeTimer = window.setTimeout(() => {
        lightbox.classList.remove("is-closing");
        lightbox.setAttribute("aria-hidden", "true");
        lightboxImage.removeAttribute("src");
        lightboxImage.alt = "";
        document.body.style.overflow = "";
      }, 240);
    };

    const navFragment = document.createDocumentFragment();
    const galleryFragment = document.createDocumentFragment();
    Object.entries(scenarioClasses).forEach(([category, names]) => {
      const categoryId = category.toLowerCase().replace(/[^a-z0-9]+/g, "-");
      const categoryItems = names.flatMap((name) => groupedByScenario[name] || []);

      const navLink = document.createElement("a");
      navLink.className = "topbar-link";
      navLink.href = `#${categoryId}`;
      navLink.dataset.sectionId = categoryId;
      navLink.textContent = category;
      navLink.addEventListener("click", (event) => {
        event.preventDefault();
        setActiveSection(categoryId);
        if (window.location.hash !== `#${categoryId}`) {
          history.replaceState(null, "", `#${categoryId}`);
        }
        document.getElementById(categoryId)?.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      });
      navFragment.appendChild(navLink);
      navLinks.push(navLink);

      const section = document.createElement("section");
      section.className = "section";
      section.id = categoryId;
      const theme = categoryTheme[category];
      if (theme) {
        section.style.setProperty("--section-accent", theme.accent);
        section.style.setProperty("--section-accent-strong", theme.strong);
        section.style.setProperty("--section-accent-text", theme.text);
        section.style.setProperty("--section-glow", theme.glow);
      }

      const sectionHead = document.createElement("div");
      sectionHead.className = "section-head";
      sectionHead.innerHTML = `
        <h2>${category}</h2>
      `;
      section.appendChild(sectionHead);

      const stack = document.createElement("div");
      stack.className = "scenario-stack";

      names.forEach((name) => {
        const items = groupedByScenario[name] || [];
        const block = document.createElement("article");
        block.className = "scenario-block";

        const head = document.createElement("div");
        head.className = "scenario-head";
        head.innerHTML = `
          <h3>${humanize(name)}</h3>
        `;
        block.appendChild(head);

        const grid = document.createElement("div");
        grid.className = "gallery-grid";
        const gridFragment = document.createDocumentFragment();

        items.forEach((item) => {
          const card = document.createElement("figure");
          card.className = "gallery-card";
          const label = humanize(item.scenario);
          card.innerHTML = `
            <button class="gallery-trigger" type="button" aria-label="Open ${label}">
              <div class="gallery-figure">
                <img src="${getThumbPath(item.image)}" alt="${label}" loading="lazy" decoding="async" fetchpriority="low" width="480" height="270">
              </div>
            </button>
          `;
          card.querySelector(".gallery-trigger").addEventListener("click", () => {
            openLightbox(item.image, label);
          });
          gridFragment.appendChild(card);
        });

        grid.appendChild(gridFragment);
        block.appendChild(grid);
        stack.appendChild(block);
      });

      section.appendChild(stack);
      galleryFragment.appendChild(section);
    });

    topbarNav.appendChild(navFragment);
    galleryRoot.appendChild(galleryFragment);

    const sections = [...document.querySelectorAll(".section")];
    const setActiveSection = (id) => {
      navLinks.forEach((link) => {
        const isActive = link.dataset.sectionId === id;
        link.classList.toggle("is-active", isActive);
        if (isActive) {
          link.setAttribute("aria-current", "true");
        } else {
          link.removeAttribute("aria-current");
        }
      });
    };

    if (sections.length) {
      const getActiveSectionId = () => {
        const topOffset = 120;
        const scrollAnchor = window.scrollY + topOffset;
        let activeId = sections[0].id;

        sections.forEach((section) => {
          if (section.offsetTop <= scrollAnchor) {
            activeId = section.id;
          }
        });

        return activeId;
      };

      const syncActiveSection = () => {
        setActiveSection(getActiveSectionId());
      };

      syncActiveSection();
      window.addEventListener("scroll", syncActiveSection, { passive: true });
      window.addEventListener("resize", syncActiveSection);
      window.addEventListener("hashchange", syncActiveSection);
    }

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
        closeLightbox();
      }
    });
  </script>
</body>
